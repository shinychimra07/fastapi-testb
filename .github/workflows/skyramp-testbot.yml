name: Skyramp Testbot

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      # Common source directories
      - 'src/**'
      - 'app/**'
      - 'lib/**'
      - 'api/**'
      - 'server/**'
      - 'backend/**'
      - 'frontend/**'
      - 'web/**'
      - 'core/**'
      # Monorepo patterns
      - 'packages/**'
      - 'apps/**'
      - 'services/**'
      # Go conventions
      - 'cmd/**'
      - 'pkg/**'
      - 'internal/**'
      # Rust workspaces
      - 'crates/**'
      # Serverless
      - 'functions/**'
      # Frontend framework conventions
      - 'pages/**'
      - 'components/**'
      # Ruby/Rails
      - 'db/**'
      - 'config/**'
      # Common web patterns
      - 'routes/**'
      - 'controllers/**'
      - 'models/**'
      - 'views/**'
      - 'handlers/**'
      - 'middleware/**'
      # Tests
      - 'tests/**'
      - 'test/**'
      - 'spec/**'
      # Build and dependency files
      - 'package.json'
      - 'package-lock.json'
      - 'yarn.lock'
      - 'pnpm-lock.yaml'
      - 'pyproject.toml'
      - 'setup.py'
      - 'setup.cfg'
      - 'requirements*.txt'
      - 'Pipfile'
      - 'poetry.lock'
      - 'go.mod'
      - 'go.sum'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'pom.xml'
      - 'build.gradle'
      - 'build.gradle.kts'
      - 'Gemfile'
      - 'Gemfile.lock'
      - '*.csproj'
      - '*.sln'
      - 'Dockerfile'
      - 'docker-compose.yml'
      - 'docker-compose.yaml'

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref }}
  cancel-in-progress: true

jobs:
  testbot:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: skyramp/testbot@shiny/test-recom-update
        with:
          skyramp_license_file: ${{ secrets.SKYRAMP_LICENSE_FILE }}
          anthropic_api_key: ${{ secrets.SKYRAMP_TESTBOT_API_KEY }}
          enable_debug: true
          skyramp_mcp_version: next
